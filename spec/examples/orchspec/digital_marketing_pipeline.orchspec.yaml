orchspec_version: '1.0'
pipeline_id: digital_marketing_pipeline
description: Fetch campaigns, transform metrics, send email
metadata:
  name: digital_marketing_pipeline
  owner: unknown
  domain: general
  complexity: medium
components:
  - id: fetch_campaigns
    name: Fetch Campaigns
    category: Extractor
    executor:
      type: http_request
  - id: transform_metrics
    name: Transform
    category: Transformer
    executor:
      type: python_script
  - id: notify_team
    name: Notify
    category: Notifier
    executor:
      type: email
flow:
  pattern: sequential
  entry_points:
    - fetch_campaigns
  edges:
    - from: fetch_campaigns
      to: transform_metrics
      edge_type: success
    - from: transform_metrics
      to: notify_team
      edge_type: success
