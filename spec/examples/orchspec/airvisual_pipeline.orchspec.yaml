orchspec_version: '1.0'
pipeline_id: airvisual_pipeline
description: Fetch air quality and load PostgreSQL
metadata:
  name: airvisual_pipeline
  owner: unknown
  domain: general
  complexity: low
components:
  - id: extract_airvisual_api
    name: Extract AirVisual API Data
    category: Extractor
    executor:
      type: python_script
  - id: load_airvisual_to_postgresql
    name: Load AirVisual Data to PostgreSQL
    category: Loader
    executor:
      type: python_script
flow:
  pattern: sequential
  entry_points:
    - extract_airvisual_api
  edges:
    - from: extract_airvisual_api
      to: load_airvisual_to_postgresql
      edge_type: success
